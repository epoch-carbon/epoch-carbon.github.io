<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epoch Carbon</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: monospace;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.8;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: left;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 50%;
            margin: 2rem 0 1rem 0;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin: 0 0 12rem 0;
            font-weight: 300;
        }

        .content {
            margin-top: 0;
            font-size: 1.15rem;
        }

        .content p {
            margin-top: 4rem;
            font-weight: bold;
        }

        .additional-content {
            margin: auto 0;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .navigation {
            margin-top: 2rem;
            text-align: center;
            padding-bottom: 2rem;
            display: flex;
            justify-content: center;
            gap: 5rem;
            max-width: 100%;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #000000;
            padding: 0.75rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: translateY(-5px);
            border: 1px solid #eaeaea;
        }

        .nav-item span {
            font-family: monospace;
            letter-spacing: 0.1em;
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .products-spacing {
            margin-bottom: 3.5rem;
        }

        .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .footer {
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 5rem;
        }

        .footer-links a {
            text-decoration: none;
            color: #000000;
            font-family: monospace;
            letter-spacing: 0.1em;
            font-weight: 300;
            font-size: 0.9rem;
        }

        p {
            margin: 1.5rem 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.svg" alt="Epoch Carbon Logo" class="logo">
        <div class="tagline">Advanced Carbons Design & Manufacturing</div>
        
        <nav class="navigation">
          <a href="/products/" class="nav-item">
            <span>Shop Products</span>
            <div class="nav-icon"><img src="products_icon.svg" alt="Products Icon" width="70" height="70" style="margin-top: 10px;"></div>
          </a>
          <a href="/equipment/" class="nav-item">
            <span>Shop Equipment</span>
            <div class="nav-icon"><img src="equipment_icon.svg" alt="Equipment Icon" width="80" height="80"></div>
          </a>
      </nav>
    </div>
    <footer class="footer">
        <div class="footer-links">
            <a href="https://twitter.com/EpochCarbon" target="_blank">Updates</a>
            <a href="mailto:jobs@epoch.earth">Careers</a>
        </div>
    </footer>
</body>
</html>
